<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de PA - Pro v10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .status-crise { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 dark:text-white p-4 md:p-6">

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-blue-600">Monitor de PA <span class="text-xs bg-blue-100 px-2 py-1 rounded">v10 API</span></h1>
        <button onclick="document.documentElement.classList.toggle('dark')" class="bg-gray-800 dark:bg-yellow-400 dark:text-black text-white px-4 py-2 rounded-xl font-bold">Tema</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <input id="inputBusca" class="border-2 rounded-xl p-3 font-bold dark:bg-gray-800 col-span-2" placeholder="Termo de busca...">
        <button onclick="executarBusca()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold">Buscar Agora</button>
        <button onclick="exportarPDF()" class="bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold">PDF A4</button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center font-bold">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">Positivo<br><span id="numPos" class="text-green-500 text-xl">0</span></div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">Negativo<br><span id="numNeg" class="text-red-500 text-xl">0</span></div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">Neutro<br><span id="numNeu" class="text-gray-500 text-xl">0</span></div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border-b-4 border-red-600">Crises<br><span id="numCri" class="text-red-700 text-xl">0</span></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
            <div id="loader" class="hidden text-center p-10 font-bold animate-pulse">Processando API...</div>
            <div id="feed"></div>
        </div>
        <div class="space-y-6">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow"><canvas id="chartPizza"></canvas></div>
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow"><canvas id="chartLinha"></canvas></div>
        </div>
    </div>
</div>

<script>
// --- CONFIGURAÇÃO ---
const API_KEY = '823f153e34924d7b82e34244d9851532'; // <--- COLE SUA CHAVE DA NEWSAPI.ORG AQUI
// -------------------

const el = {
    input: document.getElementById('inputBusca'),
    feed: document.getElementById('feed'),
    loader: document.getElementById('loader'),
    numPos: document.getElementById('numPos'),
    numNeg: document.getElementById('numNeg'),
    numNeu: document.getElementById('numNeu'),
    numCri: document.getElementById('numCri'),
    ctxP: document.getElementById('chartPizza').getContext('2d'),
    ctxL: document.getElementById('chartLinha').getContext('2d')
};

let STATE = { dados: [], stats: { Positivo: 0, Negativo: 0, Neutro: 0, Crise: 0 }, charts: {} };

function classificar(txt) {
    const t = txt.toLowerCase();
    const bad = ["crime", "fraude", "corrupção", "queda", "prejuízo", "crise", "erro", "demissão", "processo"];
    const good = ["sucesso", "lucro", "crescimento", "alta", "recorde", "inovação", "investimento"];
    
    if (bad.some(w => t.includes(w))) return { cat: "Negativo", crise: t.includes("crime") || t.includes("fraude") };
    if (good.some(w => t.includes(w))) return { cat: "Positivo", crise: false };
    return { cat: "Neutro", crise: false };
}

async function executarBusca() {
    const termo = el.input.value.trim();
    if (!termo) return alert("Digite algo!");
    if (API_KEY === 'SUA_CHAVE_AQUI') return alert("Insira sua API Key no código!");

    el.loader.classList.remove('hidden');
    el.feed.innerHTML = "";

    try {
        // Busca notícias dos últimos 30 dias em português
        const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(termo)}&language=pt&sortBy=publishedAt&apiKey=${API_KEY}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.status === "error") throw new Error(data.message);
        
        processar(data.articles.slice(0, 20));
    } catch (err) {
        alert("Erro: " + err.message);
    } finally {
        el.loader.classList.add('hidden');
    }
}

function processar(artigos) {
    STATE.dados = [];
    STATE.stats = { Positivo: 0, Negativo: 0, Neutro: 0, Crise: 0 };
    
    artigos.forEach(a => {
        const analise = classificar(a.title);
        const item = {
            titulo: a.title,
            link: a.url,
            data: new Date(a.publishedAt).toLocaleDateString("pt-BR"),
            cat: analise.cat,
            crise: analise.crise
        };

        STATE.dados.push(item);
        STATE.stats[item.cat]++;
        if (item.crise) STATE.stats.Crise++;

        const card = document.createElement("div");
        card.className = `p-4 mb-3 rounded-xl shadow bg-white dark:bg-gray-800 ${item.crise ? 'status-crise' : ''}`;
        card.innerHTML = `
            <div class="text-[10px] font-bold ${item.cat === 'Positivo' ? 'text-green-500' : 'text-red-400'}">${item.cat} | ${item.data}</div>
            <a href="${item.link}" target="_blank" class="font-bold hover:text-blue-500">${item.titulo}</a>
        `;
        el.feed.appendChild(card);
    });
    renderCharts();
}

function renderCharts() {
    el.numPos.innerText = STATE.stats.Positivo;
    el.numNeg.innerText = STATE.stats.Negativo;
    el.numNeu.innerText = STATE.stats.Neutro;
    el.numCri.innerText = STATE.stats.Crise;

    if (STATE.charts.p) STATE.charts.p.destroy();
    STATE.charts.p = new Chart(el.ctxP, {
        type: 'doughnut',
        data: {
            labels: ['Pos', 'Neg', 'Neu'],
            datasets: [{ data: [STATE.stats.Positivo, STATE.stats.Negativo, STATE.stats.Neutro], backgroundColor: ['#10b981', '#ef4444', '#94a3b8'] }]
        }
    });
}

function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Relatório de Monitoramento", 20, 20);
    let y = 30;
    STATE.dados.forEach(d => {
        if(y > 280) { doc.addPage(); y = 20; }
        doc.setFontSize(8);
        doc.text(`${d.data} - ${d.titulo.substring(0, 80)}...`, 20, y);
        y += 7;
    });
    doc.save("monitor.pdf");
}
</script>
</body>
</html>
