<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
tailwind.config = { darkMode: 'class' }
</script>

<style>
body{
font-family: Inter, sans-serif;
transition: background 0.3s, color 0.3s;
}
.status-crise{
border:2px solid #ef4444;
}
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 dark:text-white p-4 md:p-6">

<div class="max-w-7xl mx-auto">

<!-- TOPO -->
<div class="flex justify-between items-center mb-6 flex-wrap gap-4">
<h1 class="text-2xl md:text-3xl font-black">
Monitor de PA
</h1>

<button onclick="alternarTema()"
class="bg-gray-800 dark:bg-yellow-400 dark:text-black text-white px-4 py-2 rounded-xl font-bold">
Alternar Tema
</button>
</div>

<!-- BUSCA -->
<div class="grid md:grid-cols-6 gap-4 mb-6">

<input id="inputBusca"
class="border-2 rounded-xl p-3 font-bold dark:bg-gray-800 col-span-2"
placeholder="Digite o nome ou empresa...">

<select id="tipoBusca"
class="border-2 rounded-xl p-3 font-bold dark:bg-gray-800"
onchange="toggleEstado()">
<option value="internacional">Internacional</option>
<option value="nacional">Brasil</option>
<option value="estado">Por Estado</option>
</select>

<select id="estadoBrasil"
class="border-2 rounded-xl p-3 font-bold hidden dark:bg-gray-800">
<option>S?o Paulo</option>
<option>Rio de Janeiro</option>
<option>Minas Gerais</option>
<option>Bahia</option>
<option>Paraná</option>
<option>Rio Grande do Sul</option>
<option>Santa Catarina</option>
<option>Distrito Federal</option>
</select>

<button onclick="executarBusca()"
class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold">
Buscar
</button>

<button onclick="exportarPDF()"
class="bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold">
Exportar PDF A4
</button>

</div>

<!-- ESTATÍSTICAS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center font-bold">

<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
Positivo<br><span id="numPos">0</span>
</div>

<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
Negativo<br><span id="numNeg">0</span>
</div>

<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
Neutro<br><span id="numNeu">0</span>
</div>

<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
Incidentes<br><span id="numCri">0</span>
</div>

</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

<div class="lg:col-span-2">

<div id="loader" class="hidden font-bold mb-4">
Carregando notícias...
</div>

<div id="feed"></div>

<div class="mt-8 bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
<h3 class="font-black mb-4">Pesquisa em Redes Sociais</h3>
<div id="socialLinks" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
</div>

</div>

<div class="space-y-8">

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
<canvas id="chartPizza"></canvas>
</div>

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
<canvas id="chartLinha"></canvas>
</div>

</div>

</div>
</div>

<script>
const { jsPDF } = window.jspdf;

const STATE={
dados:[],
estatisticas:{Positivo:0,Negativo:0,Neutro:0,Crise:0},
linksSociais:[],
chartPizza:null,
chartLinha:null
};

/* TEMA */
function alternarTema(){
document.documentElement.classList.toggle("dark");
}

/* ESTADO */
function toggleEstado(){
estadoBrasil.classList.toggle("hidden",tipoBusca.value!=="estado");
}

/* CLASSIFICADOR EXPANDIDO */
function classificar(texto){

const t=texto.toLowerCase();

const crise=[
"crime","fraude","corrupç?o","escândalo","pris?o","morte",
"assassinato","denúncia","impeachment","tragédia",
"violência","processo","condenado"
];

const negativo=[
"erro","falha","queda","prejuízo","crise",
"demiss?o","reclamaç?o","acusaç?o","rombo",
"instabilidade","inflaç?o","desastre",
"polêmica","perda","cancelamento"
];

const positivo=[
"sucesso","vitória","crescimento","recorde",
"lucro","expans?o","aprovaç?o","inovaç?o",
"lançamento","avanço","melhora",
"liderança","valorizaç?o","investimento","parceria"
];

for(let termo of crise){
if(t.includes(termo)) return {cat:"Negativo",crise:true};
}
for(let termo of negativo){
if(t.includes(termo)) return {cat:"Negativo",crise:false};
}
for(let termo of positivo){
if(t.includes(termo)) return {cat:"Positivo",crise:false};
}
return {cat:"Neutro",crise:false};
}

/* BUSCA */
async function executarBusca(){

const nome=inputBusca.value.trim();
if(!nome) return;

let consulta=`"${nome}"`;

if(tipoBusca.value==="nacional") consulta+=" Brasil";
if(tipoBusca.value==="estado") consulta+=` "${estadoBrasil.value}"`;

const url=`https://news.google.com/rss/search?q=${encodeURIComponent(consulta)}&hl=pt-BR&ceid=BR:pt-419`;
const proxy=`https://corsproxy.io/?${encodeURIComponent(url)}`;

loader.classList.remove("hidden");

const resp=await fetch(proxy);
const txt=await resp.text();
const xml=new DOMParser().parseFromString(txt,"text/xml");

const itens=Array.from(xml.querySelectorAll("item")).slice(0,20);

processarResultados(itens);
gerarLinksSociais(nome);

loader.classList.add("hidden");
}

/* PROCESSAR */
function processarResultados(itens){

STATE.dados=[];
STATE.estatisticas={Positivo:0,Negativo:0,Neutro:0,Crise:0};

feed.innerHTML="";

itens.forEach(item=>{

const titulo=item.querySelector("title").textContent;
const link=item.querySelector("link").textContent;
const data=new Date(item.querySelector("pubDate").textContent)
.toLocaleDateString("pt-BR");

const analise=classificar(titulo);

STATE.estatisticas[analise.cat]++;
if(analise.crise) STATE.estatisticas.Crise++;

STATE.dados.push({titulo,link,data,analise});

const div=document.createElement("div");
div.className=`bg-white dark:bg-gray-800 p-4 rounded-xl shadow mb-4 ${analise.crise?'status-crise':''}`;

div.innerHTML=`
<div class="text-xs font-bold mb-1">
${analise.cat} - ${data}
</div>
<a href="${link}" target="_blank"
class="font-bold text-blue-500 hover:underline">
${titulo}
</a>`;

feed.appendChild(div);
});

atualizarGraficos();
}

/* REDES SOCIAIS */
function gerarLinksSociais(nome){

const e=encodeURIComponent(nome);

STATE.linksSociais=[
["Facebook",`https://www.facebook.com/search/top?q=${e}`],
["Instagram",`https://www.instagram.com/explore/tags/${nome.replace(/\s+/g,"")}/`],
["X",`https://twitter.com/search?q=${e}`],
["TikTok",`https://www.tiktok.com/search?q=${e}`],
["YouTube",`https://www.youtube.com/results?search_query=${e}`],
["LinkedIn",`https://www.linkedin.com/search/results/all/?keywords=${e}`]
];

socialLinks.innerHTML="";

STATE.linksSociais.forEach(r=>{
const a=document.createElement("a");
a.href=r[1];
a.target="_blank";
a.className="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl text-center font-bold";
a.innerText=r[0];
socialLinks.appendChild(a);
});
}

/* GRÁFICOS */
function atualizarGraficos(){

numPos.innerText=STATE.estatisticas.Positivo;
numNeg.innerText=STATE.estatisticas.Negativo;
numNeu.innerText=STATE.estatisticas.Neutro;
numCri.innerText=STATE.estatisticas.Crise;

if(STATE.chartPizza) STATE.chartPizza.destroy();
if(STATE.chartLinha) STATE.chartLinha.destroy();

STATE.chartPizza=new Chart(chartPizza,{
type:"doughnut",
data:{
labels:["Positivo","Negativo","Neutro"],
datasets:[{
data:[
STATE.estatisticas.Positivo,
STATE.estatisticas.Negativo,
STATE.estatisticas.Neutro
],
backgroundColor:["#10b981","#ef4444","#94a3b8"]
}]
}
});

const datas={};
STATE.dados.forEach(n=>{
datas[n.data]=(datas[n.data]||0)+1;
});

STATE.chartLinha=new Chart(chartLinha,{
type:"line",
data:{
labels:Object.keys(datas),
datasets:[{
label:"Notícias por Data",
data:Object.values(datas),
borderColor:"#3b82f6",
fill:false
}]
}
});
}

/* PDF A4 PROFISSIONAL */
function exportarPDF(){

if(!STATE.dados.length){
alert("Nenhum relatório disponível.");
return;
}

const doc=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
});

const pageWidth=210;
const pageHeight=297;
const margin=20;
const maxWidth=pageWidth-(margin*2);

let y=margin;

doc.setFont("helvetica","bold");
doc.setFontSize(16);
doc.text("RELATORIO MONITOR PRO v9.0",pageWidth/2,y,{align:"center"});
y+=10;

doc.setFontSize(11);
doc.setFont("helvetica","normal");
doc.text(`Gerado em: ${new Date().toLocaleString("pt-BR")}`,margin,y);
y+=10;

doc.setFont("helvetica","bold");
doc.text("Resumo:",margin,y);
y+=7;

doc.setFont("helvetica","normal");
doc.text(`Positivo: ${STATE.estatisticas.Positivo}`,margin,y); y+=6;
doc.text(`Negativo: ${STATE.estatisticas.Negativo}`,margin,y); y+=6;
doc.text(`Neutro: ${STATE.estatisticas.Neutro}`,margin,y); y+=6;
doc.text(`Incidentes: ${STATE.estatisticas.Crise}`,margin,y); y+=10;

doc.setFont("helvetica","bold");
doc.text("Redes Sociais:",margin,y);
y+=8;

doc.setFont("helvetica","normal");

STATE.linksSociais.forEach(r=>{
if(y>pageHeight-margin){doc.addPage(); y=margin;}
const linhas=doc.splitTextToSize(`${r[0]}: ${r[1]}`,maxWidth);
doc.text(linhas,margin,y);
y+=(linhas.length*5)+4;
});

y+=5;

doc.setFont("helvetica","bold");
doc.text("Noticias:",margin,y);
y+=8;

doc.setFont("helvetica","normal");

STATE.dados.forEach(n=>{
if(y>pageHeight-margin){doc.addPage(); y=margin;}
const bloco=`${n.data} - ${n.analise.cat}\n${n.titulo}\n${n.link}`;
const linhas=doc.splitTextToSize(bloco,maxWidth);
doc.text(linhas,margin,y);
y+=(linhas.length*5)+6;
});

const total=doc.getNumberOfPages();

for(let i=1;i<=total;i++){
doc.setPage(i);
doc.setFontSize(9);
doc.text(`Pagina ${i} de ${total}`,pageWidth/2,pageHeight-10,{align:"center"});
}

doc.save("relatorio-monitor-pro-v9-A4.pdf");
}
</script>

</body>
</html>
